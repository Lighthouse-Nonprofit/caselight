name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security scans (SAST + dependency CVEs)
    runs-on: ubuntu-latest
    env:
      BUNDLE_WITHOUT: "staging demo production"
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Brakeman (SAST, fails on NEW findings vs the committed baseline)
        run: mkdir -p tmp && bundle exec brakeman --no-pager --compare config/brakeman_baseline.json -f json -o tmp/brakeman.json
      - name: bundler-audit (dependency CVEs; ignores tracked in .bundler-audit.yml -> POA&M)
        run: |
          bundle exec bundle-audit update
          bundle exec bundle-audit check

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1

  test:
    name: Test suite (PG 17 / Mongo 6 / Redis)
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      BUNDLE_WITHOUT: "staging demo production"
      DATABASE_NAME_TEST: oscar_test
      DATABASE_USER: oscar
      DATABASE_PASSWORD: testpass
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      HISTORY_DATABASE_HOST: localhost
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY_BASE: ci_only_secret_key_base_not_a_real_secret_0000000000000000000000
      # Mailer addresses: mailers read from/to from ENV (ApplicationMailer `default from: ENV['SENDER_EMAIL']`,
      # AbleScreeningMailer `to: ENV['ABLE_MANAGER_EMAIL']`). Unset -> blank from -> ArgumentError on deliver_now.
      # CI-only placeholder addresses, not secrets.
      SENDER_EMAIL: ci-noreply@example.test
      DEV_EMAIL: ci-dev@example.test
      ABLE_MANAGER_EMAIL: ci-able@example.test
      CIF1_EMAIL: ci-cif1@example.test
      CIF2_EMAIL: ci-cif2@example.test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: oscar
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: oscar_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U oscar" --health-interval 5s --health-timeout 5s --health-retries 20
      mongo:
        image: mongo:6.0
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'" --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:5
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v7
      - name: System deps (libpq for the pg gem)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Load test schema
        run: bundle exec rails db:schema:load
      - name: RSpec (non-feature suite)
        run: bundle exec rspec spec/models spec/serializers spec/decorators spec/helpers spec/mailers spec/requests spec/controllers spec/lib spec/services spec/views spec/schedule_spec.rb
