# docker-compose.dev.yml - local development overlay for CaseLight.
#
# Deliberately NOT named docker-compose.override.yml. That name is auto-merged by
# `docker compose up`, which would silently flip the PRODUCTION box into dev mode
# (source-mounted, development env) the moment it pulls the repo. This overlay is
# loaded only when you ask for it explicitly:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# The Makefile wraps that as `make dev`. The box runs plain `docker compose up`
# and never sees this file.

services:
  app:
    # Build the dev/test image with ALL gem groups (rspec/capybara/factory_bot) baked in,
    # so the test suite survives rebuilds (a repeatable per-rung loop for the Rails upgrade).
    # Overrides the Dockerfile's prod default of `--without development test`; here we skip
    # only the prod-only groups. The box build does NOT pass this arg, so prod stays lean.
    build:
      context: .
      args:
        BUNDLE_WITHOUT: "staging demo production"
    # Live-mount the source so edits apply without a rebuild. Gems live in the
    # image at /usr/local/bundle and are not shadowed by this mount.
    volumes:
      - .:/app
    # Host port 3000 is commonly taken by other local services (e.g. Open WebUI),
    # so publish the dev app on 3001 instead. !override REPLACES the base compose
    # ports list -- Compose merges sequences by default, which would re-add :3000
    # and keep conflicting. Container still listens on 3000; browse cases.localhost:3001.
    ports: !override
      - "127.0.0.1:3001:3000"
    command: bundle exec thin start -a 0.0.0.0 -p 3000 -e development
    stdin_open: true   # attach for byebug/pry: docker attach <container>
    tty: true

  sidekiq:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: "staging demo production"
    volumes:
      - .:/app
    command: bundle exec sidekiq -e development

  # Dev runs PostgreSQL 17. The base compose (and the prod box) stay on 9.6 until prod's own
  # dump/restore migration, so overriding here keeps dev ahead without touching prod. The dev
  # caselight_pg volume was migrated 9.6 -> 17 via pg_dump (PG17 client) | pg_restore.
  db:
    image: postgres:17
