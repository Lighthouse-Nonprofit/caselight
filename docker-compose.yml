# docker-compose.yml - CaseLight pilot stack (Ruby 3.3 / Rails 7.1 / Mongo 6.0 / Postgres 17).
# Datastores are NOT published to the host; the app is published only on 127.0.0.1:3000
# (reach it via the SSM/SSH tunnel). For public HTTPS, enable the Dockerized "caddy"
# service via the "proxy" profile (set APP_HOST in .env first). See OPERATIONS.md / SECURITY.md.

services:
  db:
    # postgres:17 (migrated from 9.6 via dump/restore). PG data dirs are incompatible across major
    # versions, so a major bump means: dump -> wipe the volume -> fresh image -> pg_restore (not an
    # in-place image swap). See the postgres-migration playbook / OPERATIONS.md.
    image: postgres:17
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes: [pg:/var/lib/postgresql/data]
    restart: unless-stopped

  mongo:
    image: mongo:6.0        # Mongoid 8.1 supports MongoDB 4.4-7.0 (was 3.6 for the EOL Mongoid 5.2)
    volumes: [mongo:/data/db]
    restart: unless-stopped

  redis:
    image: redis:5
    volumes: [redis:/data]
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    depends_on: [db, mongo, redis]
    ports: ["127.0.0.1:3000:3000"]
    # Persist locally-stored documents (CarrierWave :file -> public/uploads) across
    # rebuilds/redeploys. Without this, every `docker compose build && up` wipes them.
    # The named volume lives on the host's (encrypted) EBS volume; cover it in EBS
    # snapshots. Shared with sidekiq so background jobs see the same files.
    volumes: [uploads:/app/public/uploads]
    restart: unless-stopped

  sidekiq:
    build: .
    env_file: .env
    depends_on: [db, mongo, redis]
    command: bundle exec sidekiq -e production
    volumes: [uploads:/app/public/uploads]
    restart: unless-stopped

  # Optional TLS-terminating reverse proxy. Off by default (profile "proxy"); enable with
  #   docker compose --profile proxy up -d caddy
  # once APP_HOST is set in .env, DNS points APP_HOST at this box, and the security group
  # allows inbound 80/443. Caddy then auto-provisions a Let's Encrypt cert for APP_HOST.
  caddy:
    image: caddy:2
    profiles: ["proxy"]
    depends_on: [app]
    ports: ["80:80", "443:443"]
    environment:
      APP_HOST: ${APP_HOST:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pg: {}
  mongo: {}
  redis: {}
  uploads: {}
  caddy_data: {}
  caddy_config: {}
